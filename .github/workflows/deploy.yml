name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (base-href for repo)
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          npm run build -- --base-href "angular-menu-test"

      - name: Detect build output folder
        id: detect
        run: |
          set -e
          if [ ! -d dist ]; then
            echo "dist folder not found"
            exit 1
          fi

          OUT_DIR="$(find dist -type f -name index.html -print0 | xargs -0 -n1 dirname | head -n1)"
          if [ -z "$OUT_DIR" ]; then
            echo "index.html not found in dist"
            find dist -maxdepth 4 -type f | head -n 50
            exit 1
          fi

          echo "Detected OUT_DIR=$OUT_DIR"
          echo "out_dir=$OUT_DIR" >> $GITHUB_OUTPUT

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.out_dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4